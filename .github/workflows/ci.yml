name: CI Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run domain tests
        run: cargo test -p domain

  build-deploy:
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: |
          TRUNK_VERSION=$(curl -sfL https://api.github.com/repos/trunk-rs/trunk/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          if [ -z "$TRUNK_VERSION" ]; then echo "::error::Failed to fetch Trunk version from GitHub API" && exit 1; fi
          curl -sfL "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" | tar xzf - -C /usr/local/bin
          trunk --version

      - name: Cache SoundFont
        uses: actions/cache@v4
        with:
          path: .cache/
          key: soundfont-${{ hashFiles('bin/sf2-sources.conf') }}

      - name: Download SoundFont
        run: bin/download-sf2.sh

      - name: Verify SoundFont exists
        run: test -f .cache/GeneralUser-GS.sf2

      - name: Build WASM app
        run: trunk build --release --public-url /peach-web/

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Inject build hash into service worker
        run: |
          HASH=$(sha256sum dist/*_bg.wasm | head -1 | cut -c1-16)
          if [ -z "$HASH" ]; then echo "::error::No *_bg.wasm found in dist/" && exit 1; fi
          sed -i "s/const CACHE_VERSION = 'peach-v1'/const CACHE_VERSION = 'peach-${HASH}'/" dist/sw.js
          echo "Injected cache version: peach-${HASH}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
